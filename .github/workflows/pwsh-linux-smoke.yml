# 在 Ubuntu（linux）运行器上验证 pwsh/install.ps1 + luo（本机若无可用 Docker，可依赖此工作流）。
name: pwsh Linux smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'pwsh/**'
      - '.github/workflows/pwsh-linux-smoke.yml'
  pull_request:
    paths:
      - 'pwsh/**'
      - '.github/workflows/pwsh-linux-smoke.yml'

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-powershell@v2
        with:
          version: '7.4'

      - name: Install fzf
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fzf
          command -v fzf
          fzf --version

      - name: Run pwsh/install.ps1
        run: |
          $ErrorActionPreference = 'Stop'
          $env:LUO_HOME = Join-Path $env:RUNNER_TEMP 'luo-ci-linux'
          if (Test-Path $env:LUO_HOME) { Remove-Item -LiteralPath $env:LUO_HOME -Recurse -Force }
          & "$PWD/pwsh/install.ps1"

      - name: Smoke — luo CLI
        run: |
          $ErrorActionPreference = 'Stop'
          $env:LUO_HOME = Join-Path $env:RUNNER_TEMP 'luo-ci-linux'
          . (Join-Path $env:LUO_HOME 'luo.ps1')
          if (-not (Get-Command luo -ErrorAction SilentlyContinue)) { throw 'luo not defined' }
          luo home
          luo add -n ci-smoke-linux -f 'Write-Output ci-linux'
          luo list | Select-Object -First 8
