# 在真实 Windows Server 运行器上验证 pwsh 安装与 luo 命令（Docker on macOS/Linux 无法启动 Windows 容器）。
name: pwsh Windows smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'pwsh/**'
      - '.github/workflows/pwsh-windows-smoke.yml'
  pull_request:
    paths:
      - 'pwsh/**'
      - '.github/workflows/pwsh-windows-smoke.yml'

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      # 与 install.ps1 的 Windows 分支一致：优先 winget；失败则 Chocolatey（GHA 上通常可用）
      - name: Install fzf
        run: |
          $ErrorActionPreference = 'Continue'
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            winget install --id=junegunn.fzf -e --source winget --accept-source-agreements --accept-package-agreements
          }
          if (-not (Get-Command fzf -ErrorAction SilentlyContinue)) {
            choco install fzf -y
          }
          # winget/choco 常把 PATH 写到 Machine/User，当前会话需刷新
          $env:Path = [string]::Join(';', @(
            [Environment]::GetEnvironmentVariable('Path', 'Machine'),
            [Environment]::GetEnvironmentVariable('Path', 'User')
          ) | Where-Object { $_ })
          if (-not (Get-Command fzf -ErrorAction SilentlyContinue)) {
            throw 'fzf not on PATH after winget/choco'
          }
          Get-Command fzf | Format-List Source, Version

      - name: Run pwsh/install.ps1
        run: |
          $ErrorActionPreference = 'Stop'
          $env:LUO_HOME = Join-Path $env:RUNNER_TEMP 'luo-ci'
          if (Test-Path $env:LUO_HOME) { Remove-Item -LiteralPath $env:LUO_HOME -Recurse -Force }
          & "$PWD/pwsh/install.ps1"

      - name: Smoke — luo CLI
        run: |
          $ErrorActionPreference = 'Stop'
          $env:LUO_HOME = Join-Path $env:RUNNER_TEMP 'luo-ci'
          . (Join-Path $env:LUO_HOME 'luo.ps1')
          if (-not (Get-Command luo -ErrorAction SilentlyContinue)) { throw 'luo command not defined after dot-source' }
          luo home
          luo add -n ci-smoke -f 'Write-Output ci-smoke'
          luo list | Select-Object -First 5
